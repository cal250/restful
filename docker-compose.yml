services:
  postgres:
    image: postgres:17-alpine
    container_name: tzw-fire-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-fire_extinguisher_management}
      POSTGRES_USER: ${POSTGRES_USER:-tzw_app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tzw_app} -d ${POSTGRES_DB:-fire_extinguisher_management}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      DATABASE_URL: postgresql://${POSTGRES_USER:-tzw_app}:${POSTGRES_PASSWORD:-change_me}@postgres:5432/${POSTGRES_DB:-fire_extinguisher_management}?schema=public
      JWT_SECRET: ${JWT_SECRET:-replace_with_a_long_random_secret_at_least_32_characters}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1h}
      PORT: 3000
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres_data:
